name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comment on PR (building)
        if: github.event_name == 'pull_request'
        id: create-comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '## プレビューデプロイ';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.startsWith(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n\nこの PR はマージ前にプレビュー環境で確認できます。\n\n⏳ デプロイ中...`,
              });
              return existing.id;
            }
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${marker}\n\nこの PR はマージ前にプレビュー環境で確認できます。\n\n⏳ デプロイ中...`,
            });
            return comment.data.id;

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.0"

      - run: opam install . --deps-only --with-test

      - run: opam exec -- dune build @dev

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy _build/default/
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Update PR comment with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = ${{ steps.create-comment.outputs.result }};
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: `## プレビューデプロイ\n\nこの PR はマージ前にプレビュー環境で確認できます。\n\n✅ デプロイ完了: ${url}`,
            });
